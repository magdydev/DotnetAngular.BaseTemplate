<header class="app-header">
  <div class="brand">
    @if (brandingService.branding().logoUrl; as logoUrl) {
      <img [src]="logoUrl" alt="" width="32" height="32" />
    }
    <span class="brand-name">{{ brandingService.branding().appName }}</span>
  </div>

  <div class="language-switcher" role="group" [attr.aria-label]="'LANGUAGE.SWITCH' | translate">
    <button type="button" [class.active]="languageService.currentLang() === 'en'" (click)="switchTo('en')">
      EN
    </button>
    <button type="button" [class.active]="languageService.currentLang() === 'ar'" (click)="switchTo('ar')">
      AR
    </button>
  </div>
</header>
