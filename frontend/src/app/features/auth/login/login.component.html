<div class="login-page">
  <div class="login-card">
    <div class="login-lang-row">
      <button
        type="button"
        class="login-lang-toggle"
        [attr.aria-label]="'LANGUAGE.SWITCH' | translate"
        (click)="toggleLanguage()"
      >
        {{ languageService.currentLang() === 'en' ? 'ع' : 'EN' }}
      </button>
    </div>

    <div class="login-header">
      @if (logoSrc(); as src) {
        <img [src]="src" alt="" width="100" height="100" class="login-logo" />
      }
      <h1 class="login-title">{{ appName() }}</h1>
      <p class="login-subtitle">{{ 'AUTH.LOGIN' | translate }}</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <label class="login-field">
        <span class="login-label">{{ 'AUTH.USERNAME' | translate }}</span>
        <input
          type="text"
          class="login-input"
          [(ngModel)]="username"
          name="username"
          autocomplete="username"
          required
          autofocus
          placeholder="admin"
        />
      </label>

      <label class="login-field">
        <span class="login-label">{{ 'AUTH.PASSWORD' | translate }}</span>
        <input
          type="password"
          class="login-input"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          required
          placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
        />
      </label>

      <button type="submit" class="login-submit" [disabled]="loading() || !username() || !password()">
        {{ 'AUTH.SIGN_IN' | translate }}
      </button>
    </form>
  </div>

  <footer class="login-powered">
    <a
      class="login-powered-link"
      href="https://www.magdytech.com"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span>{{ 'FOOTER.COPYRIGHT' | translate }}</span>
      <img src="assets/magdytech-logo.png" alt="MagdyTech Solutions" height="18" class="login-powered-logo" />
    </a>
  </footer>
</div>
